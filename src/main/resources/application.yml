spring:
  config:
    import: optional:file:${user.home}/.aifix/config.properties

  threads:
    virtual:
      enabled: true

  ai:
    google:
      genai:
        # Set via env var: export GOOGLE_AI_API_KEY="AIza..."
        # Or run: config-set-key --api-key <key>  (stored in ~/.aifix/config.properties)
        api-key: ${GOOGLE_AI_API_KEY:${SPRING_AI_GOOGLE_GENAI_API_KEY:NOT_SET}}
        chat:
          options:
            model: gemini-2.5-flash
            max-output-tokens: 8096
            temperature: 0.1

  shell:
    interactive:
      enabled: true
    script:
      enabled: true

  main:
    banner-mode: off
    web-application-type: none   # CLI mode by default; overridden to servlet in webhook profile

logging:
  level:
    com.sonar.agent: INFO
    org.springframework.ai: WARN
    org.springframework.shell: WARN

ai-fix:
  backup:
    enabled: true
