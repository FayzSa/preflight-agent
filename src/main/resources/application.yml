spring:
  ai:
    google:
      genai:
        # Set via env var: GOOGLE_AI_API_KEY=AIza...
        api-key: ${GOOGLE_AI_API_KEY:${SPRING_AI_GOOGLE_GENAI_API_KEY:NOT_SET}}
        chat:
          options:
            model: gemini-2.5-flash
            max-output-tokens: 8096
            temperature: 0.1

  shell:
    interactive:
      enabled: true
    script:
      enabled: true

  main:
    banner-mode: off

logging:
  level:
    com.sonar.agent: INFO
    org.springframework.ai: WARN
    org.springframework.shell: WARN

ai-fix:
  backup:
    enabled: true
