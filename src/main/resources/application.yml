spring:
  config:
    import: optional:file:${user.home}/.aifix/config.properties

  threads:
    virtual:
      enabled: true

  shell:
    interactive:
      enabled: true
    script:
      enabled: true

  main:
    banner-mode: off
    web-application-type: none   # CLI mode by default; overridden to servlet in webhook profile

logging:
  level:
    com.sonar.agent: INFO
    org.springframework.ai: WARN
    org.springframework.shell: WARN

ai-fix:
  backup:
    enabled: true
