# Usage:
#   docker compose run --rm ai-fix scan
#   docker compose run --rm ai-fix fix
#
# The host's current directory is mounted to /workspace so the tool
# can read local git history and write fixes back to your files.

services:
  ai-fix:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-fix:latest
    volumes:
      # Mount current project into the container's workspace
      - .:/workspace
      # Mount host git config so commits inside the container are attributed correctly
      - ~/.gitconfig:/root/.gitconfig:ro
      # Mount stored API key / config from host (written by config-set-key)
      - ~/.aifix:/root/.aifix:ro
    working_dir: /workspace
    environment:
      # API key from host environment
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY:-}
    stdin_open: true
    tty: true
